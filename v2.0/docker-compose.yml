services:
  mongodb:
    image: ${MONGO_IMAGE}
    restart: always
    env_file:
      - .env
    ports:
      - "${MONGO_BIND_ADDRESS:-127.0.0.1}:${MONGO_PORT}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      MONGO_APP_USER: ${MONGO_APP_USER}
      MONGO_APP_PASSWORD: ${MONGO_APP_PASSWORD}
    volumes:
      - mongo_data:/data/db
      - ./docker/mongo-init:/docker-entrypoint-initdb.d:ro
    networks:
      - store_network

  postgres:
    image: ${POSTGRES_IMAGE}
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    networks:
      - store_network

  api:
    image: ${API_IMAGE_NAME}:${API_IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_VERSION: ${API_BUILD_VERSION}
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--root-path", "/v2", "--proxy-headers", "--forwarded-allow-ips=*"]
    restart: always
    environment:
      APP_NAME: ${APP_NAME}
      APP_VERSION: ${APP_VERSION}
      MONGO_URI: ${MONGO_URI}
      MONGO_DB_NAME: ${MONGO_DB_NAME}
      MONGO_PRODUCTS_COLLECTION: ${MONGO_PRODUCTS_COLLECTION}
      POSTGRES_DSN: ${POSTGRES_DSN}
    depends_on:
      - mongodb
      - postgres
    expose:
      - "8000"
    networks:
      - store_network

  nginx:
    image: ${NGINX_IMAGE}
    restart: always
    depends_on:
      - api
    ports:
      - "${NGINX_BIND_ADDRESS:-127.0.0.1}:${NGINX_PORT}:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - store_network

volumes:
  mongo_data:
  postgres_data:

networks:
  store_network:
