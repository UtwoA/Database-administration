name: CI

on:
  pull_request:
  push:

jobs:
  v1-smoke:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
        working-directory: v1.0

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: v1.0/requirements.txt

      - name: Prepare environment
        run: cp .env.example .env

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Compile application
        run: python -m compileall app

      - name: Validate Docker Compose
        run: docker compose config

      - name: Start MongoDB stack
        run: docker compose up -d

      - name: Wait for MongoDB
        run: |
          for _ in {1..30}; do
            if docker compose exec -T mongodb mongosh --quiet --username admin --password admin123 --authenticationDatabase admin --eval "db.adminCommand({ ping: 1 }).ok" | grep -q 1; then
              exit 0
            fi
            sleep 2
          done
          echo "MongoDB did not become ready in time"
          exit 1

      - name: Start FastAPI
        run: |
          python -m uvicorn app.main:app --host 127.0.0.1 --port 8001 --root-path /v1 > uvicorn-ci.log 2>&1 &
          echo $! > uvicorn.pid

      - name: Wait for application
        run: |
          for _ in {1..30}; do
            if curl -fsS http://127.0.0.1:8001/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Application did not become ready in time"
          cat uvicorn-ci.log || true
          exit 1

      - name: Smoke test API
        run: |
          curl -fsS http://127.0.0.1:8001/health | grep -q '"status":"ok"'
          curl -fsS -H 'X-Role: guest' http://127.0.0.1:8001/categories | grep -q 'Laser Printers'

      - name: Smoke test HTML with root_path
        run: |
          echo "Checking home page rendering..."
          curl -fsS "http://127.0.0.1:8001/?role=user&client_id=665000000000000000000201" > /tmp/v1-home.html
          if ! grep -n '/v1/cart' /tmp/v1-home.html; then
            echo "Missing /v1/cart in the rendered home page"
            sed -n '1,120p' /tmp/v1-home.html
            exit 1
          fi

          echo "Checking forbidden redirect..."
          curl -sS -D /tmp/v1-headers.txt -o /dev/null "http://127.0.0.1:8001/manager/products?role=user"
          tr -d '\r' < /tmp/v1-headers.txt | sed -n '1,40p'
          if ! tr -d '\r' < /tmp/v1-headers.txt | grep -qi '^location: /v1/'; then
            echo "Unexpected Location header"
            cat /tmp/v1-headers.txt
            exit 1
          fi

      - name: Cleanup
        if: always()
        run: |
          if [[ -f uvicorn.pid ]]; then
            kill "$(cat uvicorn.pid)" || true
          fi
          docker compose down -v || true
