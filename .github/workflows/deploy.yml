name: Deploy v1.0

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
      REMOTE_APP_BASE: /opt/Database-administration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "$DEPLOY_HOST"
          test -n "$DEPLOY_USER"
          test -n "$DEPLOY_SSH_KEY"

      - name: Configure SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT:-22}" "$DEPLOY_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/id_ed25519 -p "${DEPLOY_PORT:-22}" -o IdentitiesOnly=yes "${DEPLOY_USER}@${DEPLOY_HOST}" "echo SSH connection verified"

      - name: Sync repository to server
        run: |
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p ${DEPLOY_PORT:-22}" \
            --exclude ".git" \
            --exclude "v1.0/.venv" \
            --exclude "v1.0/uvicorn.log" \
            --exclude "v1.0/uvicorn.err.log" \
            ./ "${DEPLOY_USER}@${DEPLOY_HOST}:${REMOTE_APP_BASE}/"

      - name: Run remote deployment
        run: |
          ssh -i ~/.ssh/id_ed25519 -o IdentitiesOnly=yes -p "${DEPLOY_PORT:-22}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "APP_BASE=${REMOTE_APP_BASE} bash ${REMOTE_APP_BASE}/deploy/scripts/deploy_v1.sh"
