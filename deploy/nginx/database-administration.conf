server {
    listen 80 default_server;
    server_name _;

    root /opt/Database-administration/portal;
    index index.html;

    location = /v1 {
        return 301 /v1/;
    }

    location = /v2 {
        return 301 /v2/;
    }

    location ^~ /v1/static/ {
        alias /opt/Database-administration/v1.0/static/;
        access_log off;
        expires 7d;
        try_files $uri =404;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /v1;
        proxy_redirect off;
    }

    location /v2/ {
        alias /opt/Database-administration/portal/versions/v2/;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
