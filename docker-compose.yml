version: '3.9'

services:

  mongodb:
    image: mongo:7
    container_name: printer_store_mongo

    restart: always

    ports:
      - "27017:27017"

    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123

    volumes:
      - mongo_data:/data/db

    networks:
      - mongo_network

  mongo-express:
    image: mongo-express:latest
    container_name: printer_store_express

    restart: always

    ports:
      - "8081:8081"

    environment:
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: pass

    depends_on:
      - mongodb

    networks:
      - mongo_network

volumes:
  mongo_data:

networks:
  mongo_network: